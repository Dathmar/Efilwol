<!-- New password -->
<div class="form-control">
    <label class="label" for="{{ form.new_password1.id_for_label }}">
        <span class="label-text font-medium">{{ form.new_password1.label }}</span>
    </label>
    {{ form.new_password1 }}
    <label class="label">
        <span class="label-text-alt text-base-content/50">{{ form.new_password1.help_text }}</span>
    </label>
    {% if form.new_password1.errors %}
        <label class="label">
            <span class="label-text-alt text-error">{{ form.new_password1.errors|join:", " }}</span>
        </label>
    {% endif %}
</div>

<!-- Confirm password -->
<div class="form-control">
    <label class="label" for="{{ form.new_password2.id_for_label }}">
        <span class="label-text font-medium">{{ form.new_password2.label }}</span>
    </label>
    {{ form.new_password2 }}
    {% if form.new_password2.errors %}
        <label class="label">
            <span class="label-text-alt text-error">{{ form.new_password2.errors|join:", " }}</span>
        </label>
    {% endif %}
</div>
