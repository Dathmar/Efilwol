{% load static %}
<div class="w-full cursor-pointer select-none"
     x-data="{
         scriptType: '{{ type }}',
         scriptName: '{{ script_obj.name }}',
         scriptId: {{ script_obj.id }},
         currentHealth: {{ hp }},
         maxHealth: {{ hp }},
         attackProgress: 0,
         isDead: false,
         isAttacking: false,
         get healthPercent() {
             return Math.round((this.currentHealth / this.maxHealth) * 100);
         },
         takeDamage(amount) {
             this.currentHealth = Math.max(0, this.currentHealth - amount);
             if (this.currentHealth === 0) { this.isDead = true; }
         },
         heal(amount) {
             if (this.isDead) return 0;
             const old = this.currentHealth;
             this.currentHealth = Math.min(this.maxHealth, this.currentHealth + amount);
             return this.currentHealth - old;
         },
         setAttacking(v) { this.isAttacking = v; },
         setAttackProgress(v) { this.attackProgress = v; }
     }"
     x-init="$dispatch('script-card-ready', { el: $el })"
     :class="{
         'opacity-40 grayscale pointer-events-none': isDead,
         'ring-2 ring-warning': isAttacking && !isDead
     }"
     script_type="{{ type }}"
     script_name="{{ script_obj.name }}"
     script_id="{{ script_obj.id }}">

    <div class="bg-base-200 rounded-lg p-2 transition-all duration-200
                [.heal-selected_&]:bg-success/20 [.heal-selected_&]:ring-2 [.heal-selected_&]:ring-success">

        <!-- Top row: icon + name + attacking badge -->
        <div class="flex items-center gap-2 mb-1">
            <span class="text-lg leading-none">
                {% if type == 'enemy' %}⚔️
                {% elif type == 'lowlife' %}👁️
                {% elif script_obj.role == 'tank' %}🛡️
                {% else %}🏹
                {% endif %}
            </span>
            <span class="text-xs font-semibold truncate flex-1">{{ script_obj.name }}</span>
            <span x-show="isAttacking"
                  class="text-xs text-warning font-bold animate-pulse shrink-0">ATK</span>
        </div>

        <!-- HP bar -->
        <div class="w-full bg-base-300 rounded-full h-3 overflow-hidden">
            <div class="h-full transition-all duration-300 flex items-center justify-center"
                 :class="{
                     'bg-success': healthPercent > 50,
                     'bg-warning': healthPercent > 25 && healthPercent <= 50,
                     'bg-error': healthPercent <= 25
                 }"
                 :style="`width: ${healthPercent}%`">
            </div>
        </div>

        <!-- HP numbers + attack progress -->
        <div class="flex justify-between items-center mt-1 gap-1">
            <span class="text-xs text-base-content/70" x-text="`${currentHealth}/${maxHealth}`"></span>
            <div class="flex-1 bg-base-300 rounded-full h-1 overflow-hidden ml-1">
                <div class="bg-warning h-full transition-all duration-100"
                     :style="`width: ${attackProgress}%`"></div>
            </div>
        </div>
    </div>
</div>
