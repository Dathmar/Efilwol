{% load static %}
<div class="navbar bg-base-300 shadow-lg" x-data="{ mobileMenuOpen: false }">
    <div class="navbar-start">
        <div class="dropdown lg:hidden">
            <label tabindex="0" class="btn btn-ghost" @click="mobileMenuOpen = !mobileMenuOpen">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                </svg>
            </label>
            <ul x-show="mobileMenuOpen" 
                @click.away="mobileMenuOpen = false"
                tabindex="0" 
                class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-200 rounded-box w-52">
                <li><a href="/" class="text-base">Home</a></li>
                <li><a href="{% url 'game:index' %}" class="text-base">Play</a></li>
                <li><a href="{% url 'script:index' %}" class="text-base">Manage Party</a></li>
            </ul>
        </div>
        <div class="hidden lg:flex">
            <ul class="menu menu-horizontal px-1 gap-2">
                <li><a href="/" class="btn btn-ghost">Home</a></li>
                <li><a href="{% url 'game:index' %}" class="btn btn-ghost">Play</a></li>
                <li><a href="{% url 'script:index' %}" class="btn btn-ghost">Manage Party</a></li>
            </ul>
        </div>
    </div>
    
    <div class="navbar-center">
        <a href="/" class="btn btn-ghost normal-case">
            <img src="{% static 'img/logo-navbar.png' %}" class="h-12" alt="Elifwol Logo">
        </a>
    </div>
    
    <div class="navbar-end gap-2">
        {% if user.is_anonymous %}
            <a href="{% url 'users:signup' %}" class="btn btn-primary btn-sm">Signup</a>
            <a href="{% url 'login' %}" class="btn btn-secondary btn-sm">Login</a>
        {% else %}
            <div class="dropdown dropdown-end">
                <label tabindex="0" class="btn btn-ghost btn-circle avatar placeholder">
                    <div class="bg-primary text-primary-content rounded-full w-10">
                        <span class="text-xl">{{ user.email|first|upper }}</span>
                    </div>
                </label>
                <ul tabindex="0" class="mt-3 z-[1] p-2 shadow menu menu-sm dropdown-content bg-base-200 rounded-box w-52">
                    <li class="menu-title">
                        <span>{{ user.email }}</span>
                    </li>
                    <li><a href="{% url 'users:profile' %}">Profile & Preferences</a></li>
                    <li><a href="{% url 'users:submit-suggestion' %}">Submit Suggestion</a></li>
                    <li>
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        {% endif %}
    </div>
</div>
