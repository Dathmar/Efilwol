<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine.js Initialization Test</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .card { border: 1px solid #00ff00; padding: 10px; margin: 10px 0; }
        .log { background: #000; padding: 10px; margin: 10px 0; max-height: 400px; overflow-y: auto; }
        .error { color: #ff0000; }
        .success { color: #00ff00; }
        .warning { color: #ffff00; }
    </style>
</head>
<body>
    <h1>Alpine.js Component Initialization Test</h1>
    
    <div class="log" id="log">
        <div>Waiting for Alpine.js to load...</div>
    </div>
    
    <div x-data="testController" x-init="init()">
        <h2>Controller Status: <span x-text="status"></span></h2>
        <p>Components Ready: <span x-text="readyCount"></span> / <span x-text="totalCount"></span></p>
        <p>Retries: <span x-text="retries"></span></p>
        
        <h3>Test Components:</h3>
        <div class="card" x-data="testCard" script_type="test" script_name="Card 1">
            Card 1 - Health: <span x-text="health"></span>
        </div>
        <div class="card" x-data="testCard" script_type="test" script_name="Card 2">
            Card 2 - Health: <span x-text="health"></span>
        </div>
        <div class="card" x-data="testCard" script_type="test" script_name="Card 3">
            Card 3 - Health: <span x-text="health"></span>
        </div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colors = { error: '#ff0000', success: '#00ff00', warning: '#ffff00', info: '#00ff00' };
            logEl.innerHTML += `<div style="color: ${colors[type]}">[${time}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        document.addEventListener('alpine:init', () => {
            log('Alpine:init event fired', 'success');
            
            Alpine.data('testCard', () => ({
                health: 100,
                init() {
                    log(`Card component initialized: ${this.$el.getAttribute('script_name')}`, 'success');
                }
            }));
            
            Alpine.data('testController', () => ({
                status: 'initializing',
                readyCount: 0,
                totalCount: 0,
                retries: 0,
                
                init() {
                    log('Controller init() called', 'info');
                    this.$nextTick(() => {
                        log('Controller $nextTick() called', 'info');
                        setTimeout(() => {
                            log('Starting component check after 1000ms delay', 'info');
                            this.checkComponents();
                        }, 1000);
                    });
                },
                
                checkComponents() {
                    log(`Check attempt #${this.retries + 1}`, 'info');
                    
                    const elements = document.querySelectorAll('[script_type="test"]');
                    this.totalCount = elements.length;
                    this.readyCount = 0;
                    
                    log(`Found ${elements.length} elements`, 'info');
                    
                    let allReady = true;
                    elements.forEach((el, i) => {
                        const name = el.getAttribute('script_name');
                        if (el.__x && el.__x.$data) {
                            this.readyCount++;
                            log(`  ✓ ${name} is ready (has __x.$data)`, 'success');
                        } else {
                            allReady = false;
                            log(`  ✗ ${name} is NOT ready (missing __x.$data)`, 'error');
                        }
                    });
                    
                    if (allReady) {
                        this.status = 'ready';
                        log('✅ ALL COMPONENTS READY!', 'success');
                    } else {
                        this.status = 'waiting';
                        this.retries++;
                        
                        if (this.retries > 10) {
                            this.status = 'failed';
                            log('❌ FAILED after 10 retries', 'error');
                        } else {
                            log(`⏳ Retrying in 500ms...`, 'warning');
                            setTimeout(() => this.checkComponents(), 500);
                        }
                    }
                }
            }));
        });
        
        document.addEventListener('alpine:initialized', () => {
            log('Alpine:initialized event fired - Alpine is fully loaded', 'success');
        });
    </script>
</body>
</html>
